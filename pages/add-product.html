  <header class="page-header">
    <h1>Add a <span>Product</span></h1>
    <p>Fill in the details below to list a new item</p>
    <div class="divider2"></div>
  </header>

  <!--Form  -->
  <section class="form-section">
    <form class="form-card" action="" method="" autocomplete="off">

      <h2>New Product</h2>
      <p class="form-sub">All fields are required</p>

      <div class="form-group">
        <label for="product-name">Product Name</label>
        <input type="text" id="product-name" name="productName" placeholder="e.g. Leather Wallet" required />
      </div>

      <div class="form-group">
        <label for="price">Price (EGP)</label>
        <input type="number" id="price" name="price" placeholder="e.g. 1500" min="0" required />
      </div>


      <div class="form-group">
        <label for="image-url">Image URL</label>
        <input type="url" id="image-url" name="imageUrl" placeholder="https://example.com/image.jpg" required />
      </div>
      <button type="submit" class="btn btn-primary form-submit">
        Add Product
      </button>

    </form>
  </section>


  <footer class="footer">
