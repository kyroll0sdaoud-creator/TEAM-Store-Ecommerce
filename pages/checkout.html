<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../bootstrap/bootstrap.css">
    <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

    <nav class="navbar">
        <a href="../../index.html" class="nav-logo">
            <img src="../logo.svg" alt="TEAM Store Logo" />
            TEAM Store
        </a>
    </nav>
    <div class="container mt-4">

        <h1>Checkout</h1>
        <div id="checkout_items"></div>

        <h3 id="total_price"></h3>
        <hr>
        <h3>Shipping Information</h3>

        <input type="text" id="name" placeholder="Name" class="form-control mb-2">
        <input type="text" id="address" placeholder="Address" class="form-control mb-2">
        <input type="text" id="phone" placeholder="Phone" class="form-control mb-2">

        <button onclick="placeOrder()" class="btn btn-primary mt-2">Place Order</button>

    </div>

    <script src="../js/checkout.js"></script>
</body>
</html>
